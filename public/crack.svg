<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="none" fill="none">
  <!-- Main radiating crack from upper-center impact point -->
  <line x1="300" y1="80" x2="180" y2="220" stroke="rgba(0,0,0,0.55)" stroke-width="1.5"/>
  <line x1="300" y1="80" x2="420" y2="200" stroke="rgba(0,0,0,0.55)" stroke-width="1.5"/>
  <line x1="300" y1="80" x2="310" y2="300" stroke="rgba(0,0,0,0.5)" stroke-width="1.2"/>
  <line x1="300" y1="80" x2="100" y2="160" stroke="rgba(0,0,0,0.45)" stroke-width="1"/>
  <line x1="300" y1="80" x2="500" y2="130" stroke="rgba(0,0,0,0.45)" stroke-width="1"/>
  <line x1="300" y1="80" x2="240" y2="10" stroke="rgba(0,0,0,0.4)" stroke-width="0.9"/>
  <line x1="300" y1="80" x2="380" y2="20" stroke="rgba(0,0,0,0.4)" stroke-width="0.9"/>

  <!-- Secondary branching cracks -->
  <line x1="180" y1="220" x2="90" y2="300" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  <line x1="180" y1="220" x2="150" y2="380" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
  <line x1="420" y1="200" x2="520" y2="290" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  <line x1="420" y1="200" x2="480" y2="370" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
  <line x1="310" y1="300" x2="200" y2="390" stroke="rgba(0,0,0,0.3)" stroke-width="0.8"/>
  <line x1="310" y1="300" x2="410" y2="390" stroke="rgba(0,0,0,0.3)" stroke-width="0.8"/>
  <line x1="100" y1="160" x2="20" y2="200" stroke="rgba(0,0,0,0.3)" stroke-width="0.7"/>
  <line x1="500" y1="130" x2="580" y2="180" stroke="rgba(0,0,0,0.3)" stroke-width="0.7"/>

  <!-- Tertiary fine cracks -->
  <line x1="180" y1="220" x2="220" y2="260" stroke="rgba(0,0,0,0.25)" stroke-width="0.6"/>
  <line x1="420" y1="200" x2="370" y2="250" stroke="rgba(0,0,0,0.25)" stroke-width="0.6"/>
  <line x1="240" y1="10" x2="200" y2="60" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
  <line x1="380" y1="20" x2="430" y2="70" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
  <line x1="90" y1="300" x2="60" y2="380" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
  <line x1="520" y1="290" x2="560" y2="370" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>

  <!-- Impact shard area near center - subtle small polygon lines -->
  <polyline points="280,70 295,55 310,72 300,88 282,80" stroke="rgba(0,0,0,0.3)" stroke-width="0.8" fill="rgba(255,255,255,0.04)"/>
  <polyline points="300,88 318,78 308,95 295,92" stroke="rgba(0,0,0,0.25)" stroke-width="0.7" fill="none"/>
</svg>
